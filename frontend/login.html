<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
</head>

<body>

    <h1>Login</h1>

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button onclick="login()">
        Login
    </button>

    <script>

        async function login() {

            const email =
                document.getElementById(
                    "email"
                ).value

            const password =
                document.getElementById(
                    "password"
                ).value

            const response = await fetch(

                "http://127.0.0.1:8000/login",

                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                        "application/json"
                    },

                    body: JSON.stringify({

                        email,
                        password

                    })
                }
            )

            const data =
                await response.json()

            console.log(data)

            if (data.access_token) {

                localStorage.setItem(

                    "token",

                    data.access_token

                )

                alert("Login success")

            } else {

                alert("Login failed")

            }
        }

    </script>

</body>

</html>
